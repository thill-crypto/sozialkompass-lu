// ── APP STATE ─────────────────────────────────────────────────
let state = { lang:"de", search:"", topics:[], urgency:null, detail:null, langOpen:false };

function t(key) { return TRANSLATIONS[state.lang][key] || key; }
function tl(key) { return (TOPIC_LABELS[state.lang] || TOPIC_LABELS.de)[key] || key; }

function getFiltered() {
  return SERVICES.filter(s => {
    if (state.urgency && s.urgency !== state.urgency) return false;
    if (state.topics.length && !state.topics.some(t => s.topics.includes(t))) return false;
    if (state.search.trim()) {
      const q = state.search.toLowerCase();
      const desc = (s.desc[state.lang] || s.desc.de).toLowerCase();
      const name = s.name.toLowerCase();
      const topicMatch = s.topics.some(t => tl(t).toLowerCase().includes(q));
      if (!name.includes(q) && !desc.includes(q) && !topicMatch) return false;
    }
    return true;
  }).sort((a,b) => ({red:0,yellow:1,green:2})[a.urgency] - ({red:0,yellow:1,green:2})[b.urgency]);
}

          <button class="lang-btn" id="langToggle">${LANG_FLAGS[state.lang]} ${state.lang.toUpperCase()} ▾</button>
          <div class="lang-dropdown ${state.langOpen?"open":""}" id="langDropdown">
            ${Object.keys(TRANSLATIONS).map(l => `<button class="lang-option ${l===state.lang?"active":""}" data-lang="${l}">${LANG_FLAGS[l]} ${l.toUpperCase()}</button>`).join("")}
          </div>
        </div>
      </div>
      <div class="emergency">
        <span>🚨 ${t("emergency")}</span>
        <a href="tel:112" class="emergency-call">112</a>
      </div>
    </header>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="searchInput" placeholder="${t("searchPlaceholder")}" value="${state.search}">
      <button class="search-clear ${state.search?"visible":""}" id="searchClear">✕</button>
    </div>

    <div class="filters">
      ${[{k:null,label:t("all"),cls:"all"},{k:"red",label:t("urgent"),cls:"red"},{k:"yellow",label:t("soon"),cls:"yellow"},{k:"green",label:t("info"),cls:"green"}].map(u =>
        `<button class="urgency-btn ${state.urgency===u.k?"active-"+u.cls:""}" data-urgency="${u.k||""}">
          ${u.k?`<span class="dot dot-${u.cls}"></span>`:""}${u.label}
        </button>`
      ).join("")}
    </div>

    <div class="topics">
      ${topicKeys.map(k => `<button class="topic-chip ${state.topics.includes(k)?"active":""}" data-topic="${k}">${TOPIC_ICONS[k]} ${tl(k)}</button>`).join("")}
    </div>

    <div class="results-header">${filtered.length} ${t("results")}</div>

    ${filtered.length === 0 ? `<div class="no-results">${t("noResults")}</div>` :
      filtered.map((s,i) => `
        <button class="card border-${s.urgency}" data-id="${s.id}" style="animation-delay:${0.05+i*0.04}s">
          <div class="card-header">
            <span class="card-name">${s.name}</span>
            <span class="urgency-badge badge-${s.urgency}">
              <span class="dot dot-${s.urgency}"></span>
              ${s.urgency==="red"?t("urgent"):s.urgency==="yellow"?t("soon"):t("info")}
            </span>
          </div>
          <div class="card-desc">${((s.desc[state.lang]||s.desc.de)).slice(0,100)}…</div>
          <div class="card-bottom">
            <div class="card-meta">
              ${s.phone?`<span class="card-phone">📞 ${s.phone}</span>`:""}
              <span>🕐 ${s.hours}</span>
            </div>
            <div class="card-tags">
              ${s.topics.slice(0,3).map(tp => `<span class="mini-tag">${TOPIC_ICONS[tp]} ${tl(tp)}</span>`).join("")}
              ${s.anonymous?`<span class="mini-tag">🔒</span>`:""}
            </div>
          </div>
        </button>
      `).join("")}

    <footer class="footer">
      <div class="footer-tagline">${t("tagline")}</div>
      <div class="footer-demo">⚠️ ${t("demoNotice")}</div>
    </footer>
  `;
}

function renderDetail(s) {
  return `
    <button class="back-btn" id="backBtn">← ${t("back")}</button>
    <div class="detail-card top-${s.urgency}">
      <div class="detail-header">
        <span class="detail-dot" style="background:var(--${s.urgency})"></span>
        <span class="detail-name">${s.name}</span>
      </div>
      <div class="detail-desc">${s.desc[state.lang]||s.desc.de}</div>

      ${s.phone?`<a href="tel:${s.phone.replace(/\s/g,"")}" class="call-btn"><span style="font-size:20px">📞</span> ${t("call")}: ${s.phone}</a>`:""}
      ${s.url?`<a href="${s.url}" target="_blank" rel="noopener noreferrer" class="web-btn">🌐 ${t("website")}</a>`:""}

      <div class="meta-list">
        <div class="meta-row"><span class="meta-icon">📍</span><span class="meta-val">${s.location}</span></div>
        <div class="meta-row"><span class="meta-icon">🕐</span><span class="meta-val">${s.hours}</span></div>
        <div class="meta-row"><span class="meta-icon">🗣️</span><span class="meta-val">${s.langs.map(l=>`${LANG_FLAGS[l.toLowerCase()]||""} ${l}`).join("  ")}</span></div>
        <div class="meta-row">
          ${s.anonymous?`<span class="badge-anon">🔒 ${t("anonymous")}</span>`:""}
          ${s.free?`<span class="badge-free">✓ ${t("free")}</span>`:""}
        </div>
      </div>

      <div class="detail-topics">
        ${s.topics.map(tp => `<span class="detail-topic">${TOPIC_ICONS[tp]} ${tl(tp)}</span>`).join("")}
      </div>
    </div>
  `;
}

// ── EVENT BINDING ─────────────────────────────────────────────
function bindEvents() {
  // Language toggle
  const langToggle = document.getElementById("langToggle");
  if (langToggle) langToggle.onclick = () => { state.langOpen = !state.langOpen; render(); };

  // Language options
  document.querySelectorAll(".lang-option").forEach(btn => {
    btn.onclick = () => { state.lang = btn.dataset.lang; state.langOpen = false; render(); };
  });

  // Search
  const input = document.getElementById("searchInput");
  if (input) {
    input.oninput = () => { state.search = input.value; render(); setTimeout(() => { const el = document.getElementById("searchInput"); if(el){el.focus(); el.selectionStart=el.selectionEnd=el.value.length;} }, 0); };
  }
  const clear = document.getElementById("searchClear");
  if (clear) clear.onclick = () => { state.search = ""; render(); document.getElementById("searchInput")?.focus(); };

  // Urgency
  document.querySelectorAll(".urgency-btn").forEach(btn => {
    btn.onclick = () => { state.urgency = btn.dataset.urgency || null; render(); };
  });

  // Topics
  document.querySelectorAll(".topic-chip").forEach(btn => {
    btn.onclick = () => {
      const tp = btn.dataset.topic;
      state.topics = state.topics.includes(tp) ? state.topics.filter(t=>t!==tp) : [...state.topics, tp];
      render();
    };
  });

  // Cards
  document.querySelectorAll(".card").forEach(card => {
    card.onclick = () => { state.detail = SERVICES.find(s => s.id === +card.dataset.id); render(); window.scrollTo(0,0); };
  });

  // Back
  const back = document.getElementById("backBtn");
  if (back) back.onclick = () => { state.detail = null; render(); };

  // Close lang dropdown on outside click
  document.addEventListener("click", (e) => {
    if (state.langOpen && !e.target.closest(".lang-wrap")) { state.langOpen = false; render(); }
  }, { once: true });
}

// ── INIT ──────────────────────────────────────────────────────
render();
</script>
</body>
</html>
